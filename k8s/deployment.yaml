apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-app
  template:
    metadata:
      labels:
        app: sre-app
    spec:
      containers:
      - name: sre-app
        image: sre-app
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000

        resources:
          requests:
            cpu: "50m"
          limits:
            cpu: "100m"
